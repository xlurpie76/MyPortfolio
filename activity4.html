<!DOCTYPE html>
    <head>
        <title>Activity 4</title>
    </head>
    <body>
            <h2>User Information</h2>
            <form action="" method= "post">
                <label for="fname"> First Name:</label><br>
                <input type="text" id="fname" name="firstname" required><br><br>

                <label for="lname"> Last Name:</label><br>
                <input type="text" id="lname" name="lastname" required><br><br>

                <label for="age">Age:</label><br>
                <input type="number" id="age" name="age"><br><br>

                <label>Gender:</label><br>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label><br></br>

                <label>Hobbies:</label><br>
                <input type="checkbox" id="hobby1" name="hobby" value="Guitar">
                <label for="hobby1">Guitar</label><br>
                <input type="checkbox" id="hobby2" name="hobby" value="Piano">
                <label for="hobby2">Piano</label><br>
                <input type="checkbox" id="hobby3" name="hobby" value="Calisthenics">
                <label for="hobby3">Calisthenics</label><br>
                <input type="checkbox" id="hobby4" name="hobby" value="Basketball">
                <label for="hobby4">Basketball</label><br>
                <input type="checkbox" id="hobby5" name="hobby" value="Table Tennis">
                <label for="hobby5">Table Tennis</label><br>
                <input type="checkbox" id="hobby6" name="hobby" value="Volleyball">
                <label for="hobby6">Volleyball</label><br>

                <label for="year-level">Year Level:</label><br>
                <select id="year-level" name="year_level">
                    <option value="1st-year">1st Year</option>
                    <option value="2nd-year">2nd Year</option>
                    <option value="3rd-year">3rd Year</option>
                    <option value="4th-year">4th Year</option>
                </select><br><br>

                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </form>

    </body>

</html>
